name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Actualizado a v4

      - name: Setup Node
        uses: actions/setup-node@v4 # Actualizado a v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Astro build
        uses: withastro/action@v2 # ¡CLAVE! Actualizado a v2 para usar los nuevos artifacts
        with:
          package-manager: npm

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # Actualizado a v4
